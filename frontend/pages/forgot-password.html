<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password - IntervAI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Reset Password</h1>
            <p>Enter your email to receive a reset link</p>
            
            <form id="forgotForm">
                <div class="form-group">
                    <input type="email" id="email" placeholder="Your email" required>
                </div>
                <button type="submit" class="btn-primary">Send Reset Link</button>
            </form>
            
            <div id="message"></div>
            <p><a href="login.html">Back to Login</a></p>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://intervai-backend.onrender.com/api';
        
        document.getElementById('forgotForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const messageDiv = document.getElementById('message');
            const submitBtn = e.target.querySelector('button');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Sending...';
            
            try {
                const response = await fetch(`${API_BASE}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                
                messageDiv.innerHTML = `<div class="alert success">${data.message}</div>`;
                submitBtn.textContent = 'Sent!';
                
            } catch (error) {
                messageDiv.innerHTML = `<div class="alert error">Network error. Please try again.</div>`;
                submitBtn.textContent = 'Send Reset Link';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
