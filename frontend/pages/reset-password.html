<!DOCTYPE html>
<html>
<head>
    <title>Reset Password - IntervAI</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>Create New Password</h1>
            
            <form id="resetForm">
                <div class="form-group">
                    <input type="password" id="password" placeholder="New password" required minlength="6">
                </div>
                <div class="form-group">
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn-primary">Reset Password</button>
            </form>
            
            <div id="message"></div>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://intervai-backend.onrender.com/api';
        
        // Get token from URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const email = urlParams.get('email');
        
        if (!token || !email) {
            document.getElementById('message').innerHTML = '<div class="alert error">Invalid reset link. Please request a new one.</div>';
            document.getElementById('resetForm').style.display = 'none';
        }
        
        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('message');
            
            if (password !== confirm) {
                messageDiv.innerHTML = '<div class="alert error">Passwords do not match</div>';
                return;
            }
            
            if (password.length < 6) {
                messageDiv.innerHTML = '<div class="alert error">Password must be at least 6 characters</div>';
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, email, newPassword: password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    messageDiv.innerHTML = '<div class="alert success">Password reset successful! Redirecting to login...</div>';
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    messageDiv.innerHTML = `<div class="alert error">${data.message}</div>`;
                }
            } catch (error) {
                messageDiv.innerHTML = '<div class="alert error">Network error. Please try again.</div>';
            }
        });
    </script>
</body>
</html>
